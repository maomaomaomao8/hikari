<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hikari</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #map { width: 100%; height: 100%; }
    #tap-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      min-width: 220px;
      padding: 14px 32px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      font: 14px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      backdrop-filter: blur(8px);
      letter-spacing: 0.01em;
    }
    #tap-btn.done {
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.06);
    }
    #overlay-text {
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      max-width: 500px;
      pointer-events: none;
    }
    #copy-line {
      font: 300 16px/1.5 'DM Sans', sans-serif;
      color: rgba(255, 255, 255, 0.7);
    }
    #count-line {
      font: 300 13px/1.5 'DM Sans', sans-serif;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 6px;
    }
    #mode-toggle {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
    }
    #mode-toggle button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font: 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #mode-toggle button.active {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }
    #preview-label {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font: 600 11px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255, 180, 80, 0.9);
      letter-spacing: 0.03em;
      white-space: nowrap;
      display: none;
    }
    #location-hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font: 300 11px/1 'DM Sans', sans-serif;
      color: rgba(255, 255, 255, 0.35);
      display: none;
    }
    @media (max-width: 768px) {
      #map {
        width: 100%;
        height: 100vh;
      }
      #overlay-text {
        max-width: 85vw;
      }
      #copy-line { font-size: 16px; }
      #count-line { font-size: 13px; }
      #tap-btn {
        bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay-text">
    <div id="copy-line"></div>
    <div id="count-line"></div>
  </div>
  <div id="mode-toggle">
    <button id="mode-live" class="active">Live</button>
    <button id="mode-preview">At Scale</button>
  </div>
  <div id="preview-label">Showing a projection — not live data</div>
  <button id="tap-btn">I'm feeding right now</button>
  <div id="location-hint">Enable location to add your dot</div>
  <script type="module" src="/main.js"></script>
</body>
</html>
