<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hikari</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #map { width: 100%; height: 100%; }
    #tap-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 12px 28px;
      font: 14px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.01em;
    }
    #tap-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
    #tap-btn:active { transform: translateX(-50%) scale(0.97); }
    #tap-btn.done { pointer-events: none; color: rgba(255,255,255,0.4); }
    #overlay-text {
      position: fixed;
      top: 25%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      max-width: 500px;
      pointer-events: none;
    }
    #copy-line {
      font: 300 16px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255, 255, 255, 0.7);
    }
    #count-line {
      font: 300 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 6px;
    }
    #mode-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
    }
    #mode-toggle button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font: 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #mode-toggle button.active {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }
    #preview-label {
      position: fixed;
      top: 52px;
      right: 20px;
      z-index: 10;
      font: 600 11px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255, 180, 80, 0.9);
      letter-spacing: 0.03em;
      display: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay-text">
    <div id="copy-line"></div>
    <div id="count-line"></div>
  </div>
  <div id="mode-toggle">
    <button id="mode-live" class="active">Live</button>
    <button id="mode-preview">Preview</button>
  </div>
  <div id="preview-label">Showing a projection — not live data</div>
  <button id="tap-btn">I'm feeding right now</button>
  <script type="module" src="/main.js"></script>
</body>
</html>
