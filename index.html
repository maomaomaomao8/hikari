<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hikari</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #map { width: 100%; height: 100%; }
    #tap-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      min-width: 220px;
      padding: 14px 32px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      font: 14px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      backdrop-filter: blur(8px);
      letter-spacing: 0.01em;
    }
    #tap-btn.done {
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.06);
    }
    #overlay-text {
      position: fixed;
      top: 124px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 90vw;
      max-width: 560px;
      padding: 0 40px;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #copy-line {
      font: 300 16px/1.5 'DM Sans', sans-serif;
      color: rgba(255, 255, 255, 0.7);
    }
    #copy-line .word {
      display: inline;
      opacity: 1;
    }
    #mode-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
    }
    #mode-toggle button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font: 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #mode-toggle button.active {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }
    #preview-label {
      position: fixed;
      top: 62px;
      right: 20px;
      z-index: 10;
      font: 600 11px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255, 180, 80, 0.9);
      letter-spacing: 0.03em;
      text-align: right;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #location-hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font: 300 11px/1 'DM Sans', sans-serif;
      color: rgba(255, 255, 255, 0.35);
      display: none;
    }
    #dot-tooltip {
      position: fixed;
      z-index: 20;
      padding: 6px 14px;
      background: rgba(15, 15, 25, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      font: 300 12px/1.3 'DM Sans', sans-serif;
      color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      white-space: nowrap;
    }
    #dot-tooltip.visible { opacity: 1; }
    @media (max-width: 768px) {
      #map {
        width: 100%;
        height: 100vh;
        opacity: 0;
        transform: scale(0.6);
        transition: opacity 1s ease, transform 1.2s ease-out;
      }
      #map.revealed { opacity: 1; transform: scale(1); }
      #mode-toggle {
        top: 24px;
        right: auto;
        left: 50%;
        transform: translateX(-50%);
      }
      #preview-label {
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }
      #overlay-text {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80vw;
        max-width: 80vw;
        padding: 0;
        transition: opacity 1s ease;
      }
      #overlay-text.intro-done {
        top: 80px;
        transform: translateX(-50%);
        width: 90vw;
        max-width: 560px;
        padding: 0 16px;
        opacity: 1;
      }
      #overlay-text.faded { opacity: 0; }
      #copy-line {
        font: 400 28px/1.4 'DM Sans', sans-serif;
        color: rgba(255, 255, 255, 0.9);
      }
      #overlay-text.intro-done #copy-line {
        font: 300 16px/1.5 'DM Sans', sans-serif;
        color: rgba(255, 255, 255, 0.7);
      }
      #copy-line .word {
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #copy-line .word.visible { opacity: 1; }
      #tap-btn {
        bottom: 24px;
        opacity: 0;
        transition: opacity 1s ease;
      }
      #tap-btn.revealed { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay-text">
    <div id="copy-line"></div>
  </div>
  <div id="mode-toggle">
    <button id="mode-live" class="active">Live</button>
    <button id="mode-preview">At Scale</button>
  </div>
  <div id="preview-label">Showing a projection — not live data</div>
  <button id="tap-btn">I'm feeding right now</button>
  <div id="location-hint">Enable location to add your dot</div>
  <div id="dot-tooltip"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
